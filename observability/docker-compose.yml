name: observability-platform-prod

services:
  prometheus:
    build:
      context: ./prometheus
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "127.0.0.1:29090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - ms-net

  loki:
    build:
      context: ./loki
    container_name: loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:23100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - ms-net

  promtail:
    build:
      context: ./promtail
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ../infra/gateway/logs:/var/log/ms/gateway:ro
      - ../services/MS1/logs:/var/log/ms/auth:ro
      - ../services/MS2/logs:/var/log/ms/user:ro
      - ../services/MS3/logs:/var/log/ms/technician:ro
      - ../services/MS4/logs:/var/log/ms/service-request:ro
      - ../services/MS5/logs:/var/log/ms/assignment:ro
      - ../services/MS6/logs:/var/log/ms/payment:ro
      - ../services/MS7/logs:/var/log/ms/review:ro
      - ../services/MS8/logs:/var/log/ms/notification:ro
    depends_on:
      - loki
    networks:
      - ms-net

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:23000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - ms-net

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  ms-net:
    external: true
    name: ms-net
