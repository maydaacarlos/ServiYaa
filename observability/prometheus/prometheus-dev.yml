global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: gateway-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:7091

  - job_name: ms-auth-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: ms-user-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8082

  - job_name: ms-technician-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8083

  - job_name: ms-service-request-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8084

  - job_name: ms-assignment-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8085

  - job_name: ms-payment-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8086

  - job_name: ms-notification-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8088

  - job_name: ms-review-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8087
