server:
  port: 8083

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 3000
  datasource:
    url: jdbc:mysql://${TECHNICIAN_DB_HOST:localhost}:${TECHNICIAN_DB_PORT:3313}/${TECHNICIAN_DB_NAME:db_technician}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${TECHNICIAN_DB_USERNAME:root}
    password: ${TECHNICIAN_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-change-dev-secret-please-change}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7081/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ms-technician

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    configs:
      default:
        timeout-duration: 3s

logging:
  level:
    root: INFO
  file:
    name: ./logs/ms-technician.log

serviya:
  internal-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-service-token}
