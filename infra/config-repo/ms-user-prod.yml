server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://${USER_DB_HOST:mysql-user}:${USER_DB_PORT:3306}/${USER_DB_NAME:db_user}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${USER_DB_USERNAME}
    password: ${USER_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://registry-server-prod:7082/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ms-user

logging:
  level:
    root: INFO
  file:
    name: ./logs/ms-user.log

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

serviya:
  internal-token: ${INTERNAL_SERVICE_TOKEN}
