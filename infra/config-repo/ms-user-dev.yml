server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: jdbc:mysql://${USER_DB_HOST:localhost}:${USER_DB_PORT:3312}/${USER_DB_NAME:db_user}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${USER_DB_USERNAME:root}
    password: ${USER_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-change-dev-secret-please-change}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7081/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ms-user

logging:
  level:
    root: INFO
  file:
    name: ./logs/ms-user.log

serviya:
  internal-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-service-token}
