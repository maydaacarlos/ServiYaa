server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: jdbc:mysql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:3310}/${AUTH_DB_NAME:db_auth}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-change-dev-secret-please-change}
    issuer: ${JWT_ISSUER:serviya}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7081/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ms-auth

logging:
  level:
    root: INFO
  file:
    name: ./logs/ms-auth.log
jwt:
  secret: ${JWT_SECRET:dev-secret-please-change-dev-secret-please-change}
  issuer: ${JWT_ISSUER:serviya}
  expiration: ${JWT_EXPIRATION:3600000}

serviya:
  internal-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-service-token}
