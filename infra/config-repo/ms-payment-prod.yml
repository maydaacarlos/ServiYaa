server:
  port: 8086

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 3000
  datasource:
    url: jdbc:mysql://${PAYMENT_DB_HOST:mysql-payment}:${PAYMENT_DB_PORT:3306}/${PAYMENT_DB_NAME:db_payment}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${PAYMENT_DB_USERNAME}
    password: ${PAYMENT_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

serviya:
  internal-token: ${INTERNAL_SERVICE_TOKEN}
  comision:
    porcentaje: ${SERVIYA_COMISION_PORCENTAJE:0.10}

security:
  jwt:
    secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://registry-server-prod:7082/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ms-payment

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    configs:
      default:
        timeout-duration: 3s

logging:
  level:
    root: INFO
  file:
    name: ./logs/ms-payment.log

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
