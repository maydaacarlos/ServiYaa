server:
  port: 8088

spring:
  datasource:
    url: jdbc:mysql://${NOTIFICATION_DB_HOST:mysql-notification}:${NOTIFICATION_DB_PORT:3306}/${NOTIFICATION_DB_NAME:db_notification}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${NOTIFICATION_DB_USERNAME}
    password: ${NOTIFICATION_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://registry-server-prod:7082/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ms-notification

logging:
  level:
    root: INFO
  file:
    name: ./logs/ms-notification.log

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

serviya:
  internal-token: ${INTERNAL_SERVICE_TOKEN}
