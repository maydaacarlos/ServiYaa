server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://${AUTH_DB_HOST:mysql-auth}:${AUTH_DB_PORT:3306}/${AUTH_DB_NAME:db_auth}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:serviya}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://registry-server-prod:7082/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ms-auth

logging:
  level:
    root: INFO
  file:
    name: ./logs/ms-auth.log
jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:auth}
  expiration: ${JWT_EXPIRATION:3600000}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

serviya:
  internal-token: ${INTERNAL_SERVICE_TOKEN}
