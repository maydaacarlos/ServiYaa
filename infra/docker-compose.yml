name: infra-platform

version: "3.9"

services:
  config-server-dev:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server-dev
    restart: unless-stopped
    ports:
      - "7071:7071"
    volumes:
      - ./config-repo:/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_REPO_LOCATION: file:/config-repo
    networks:
      - ms-net

  config-server-prod:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server-prod
    restart: unless-stopped
    ports:
      - "7072:7072"
    volumes:
      - ./config-repo:/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_REPO_LOCATION: file:/config-repo
      SERVER_PORT: 7072
    networks:
      - ms-net

  registry-server-dev:
    build:
      context: ./registry-server
      dockerfile: Dockerfile
    container_name: registry-server-dev
    restart: unless-stopped
    ports:
      - "7081:7081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URL: http://config-server-dev:7071
      SERVER_PORT: 7081
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_DEFAULT_ZONE: http://registry-server-prod:7082/eureka/
    depends_on:
      - config-server-dev
    networks:
      - ms-net

  registry-server-prod:
    build:
      context: ./registry-server
      dockerfile: Dockerfile
    container_name: registry-server-prod
    restart: unless-stopped
    ports:
      - "7082:7082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server-prod:7072
      SERVER_PORT: 7082
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_DEFAULT_ZONE: http://registry-server-dev:7081/eureka/
    depends_on:
      - config-server-prod
    networks:
      - ms-net

  gateway-dev:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway-dev
    restart: unless-stopped
    ports:
      - "7091:7091"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URL: http://config-server-dev:7071
      SERVER_PORT: 7091
      EUREKA_SERVER_URL: http://registry-server-dev:7081/eureka/
    depends_on:
      - config-server-dev
      - registry-server-dev
    networks:
      - ms-net

  gateway-prod:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway-prod
    restart: unless-stopped
    ports:
      - "7092:7092"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server-prod:7072
      SERVER_PORT: 7092
      EUREKA_SERVER_URL: http://registry-server-prod:7082/eureka/
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      - config-server-prod
      - registry-server-prod
    networks:
      - ms-net

  mysql-auth:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${AUTH_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${AUTH_DB_USERNAME}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
      MYSQL_DATABASE: db_auth
    ports:
      - "3311:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ms-net

  mysql-user:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${USER_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${USER_DB_USERNAME}
      MYSQL_PASSWORD: ${USER_DB_PASSWORD}
      MYSQL_DATABASE: db_user
    ports:
      - "3312:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ms-net

  mysql-technician:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${TECHNICIAN_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${TECHNICIAN_DB_USERNAME}
      MYSQL_PASSWORD: ${TECHNICIAN_DB_PASSWORD}
      MYSQL_DATABASE: db_technician
    ports:
      - "3313:3306"
    volumes:
      - mysql_technician_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ms-net

  mysql-service-request:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${SERVICE_REQUEST_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${SERVICEREQUEST_DB_USERNAME}
      MYSQL_PASSWORD: ${SERVICEREQUEST_DB_PASSWORD}
      MYSQL_DATABASE: db_service_request
    ports:
      - "3314:3306"
    volumes:
      - mysql_service_request_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ms-net

  mysql-asignacion:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${ASSIGNMENT_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${ASSIGNMENT_DB_USERNAME}
      MYSQL_PASSWORD: ${ASSIGNMENT_DB_PASSWORD}
      MYSQL_DATABASE: db_asignacion
    ports:
      - "3308:3306"
    volumes:
      - mysql_asignacion_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - ms-net

  mysql-payment:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${PAYMENT_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${PAYMENT_DB_USERNAME}
      MYSQL_PASSWORD: ${PAYMENT_DB_PASSWORD}
      MYSQL_DATABASE: db_payment
    ports:
      - "3316:3306"
    volumes:
