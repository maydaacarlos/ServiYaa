      retries: 20
      start_period: 20s
    networks:
      - ms-net

  mysql-review:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${REVIEW_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${REVIEW_DB_USERNAME}
      MYSQL_PASSWORD: ${REVIEW_DB_PASSWORD}
      MYSQL_DATABASE: db_review
    ports:
      - "3317:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
