  ms-auth:
    build:
      context: ../services/MS1
      dockerfile: Dockerfile
    container_name: ms-auth
    restart: unless-stopped
    depends_on:
      mysql-auth:
        condition: service_healthy
      config-server-prod:
        condition: service_started
      registry-server-prod:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server-prod:7072
      EUREKA_URL: http://registry-server-dev:7081/eureka/,http://registry-server-prod:7082/eureka/
      AUTH_DB_USERNAME: ${AUTH_DB_USERNAME}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    ports:
      - "8081:8081"
    networks:
      - ms-net

  ms-user:
