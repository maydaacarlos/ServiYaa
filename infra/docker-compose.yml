  mysql-notification:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NOTIFICATION_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${NOTIFICATION_DB_USERNAME}
      MYSQL_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      MYSQL_DATABASE: db_notification
    ports:
